<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerta do Sistema</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        #countdown { font-size: 4rem; font-weight: bold; margin-top: 20px; }
        .hidden { display: none !important; }
        #secret-link {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            cursor: default;
            background: transparent;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="phase1" style="text-align: center;">
        <h1>Você não devia estar aqui... Seus dados serão roubados</h1>
        <div id="countdown">10</div>
    </div>

    <div id="phase2" class="hidden" style="text-align: center; color: #00ff00;">
        <h1>Brincadeira hahahahaha.</h1>
        <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExbDc2azB3ZmdkMjk0MXM5cmdwcmdjeHBneXMzbjA0bjVvdjF2anBobiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/93mS3A87wfmOySC29W/giphy.gif" alt="Gatinho" height="250">
    </div>

    <div id="phase3" class="hidden">
        <a id="secret-link" href="https://crafty.lucascruz.shop" title="Painel Secreto"></a>
    </div>

    <script>
        let count = 10;
        const countElement = document.getElementById('countdown');
        const p1 = document.getElementById('phase1');
        const p2 = document.getElementById('phase2');
        const p3 = document.getElementById('phase3');
        const timer = setInterval(() => {
            count--;
            countElement.innerText = count;
            if (count <= 0) {
                clearInterval(timer);
                startPhase2();
            }
        }, 1000);

        function startPhase2() {
            p1.classList.add('hidden');
            p2.classList.remove('hidden');
            setTimeout(() => {
                startPhase3();
            }, 4000);
        }

        function startPhase3() {
            p2.classList.add('hidden');
            p3.classList.remove('hidden');
            document.body.style.backgroundColor = "#fff"; 
            setTimeout(() => {
                window.close();
                document.body.innerHTML = ""; 
                document.body.style.backgroundColor = "#fff";
            }, 10000);
        }
    </script>
</body>
</html>
